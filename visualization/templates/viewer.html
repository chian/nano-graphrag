<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Visualization - nano-graphrag</title>

    <!-- vis.js Network -->
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #eee;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background: #16213e;
            padding: 16px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #0f3460;
            overflow-y: auto;
        }

        .sidebar h1 {
            font-size: 1.2em;
            color: #e94560;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar h1::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #e94560;
            border-radius: 50%;
        }

        /* Search */
        .search-container {
            margin-bottom: 16px;
        }

        .search-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #0f3460;
            border-radius: 6px;
            background: #1a1a2e;
            color: #eee;
            font-size: 14px;
        }

        .search-input:focus {
            outline: none;
            border-color: #e94560;
        }

        .search-results {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 8px;
        }

        .search-result {
            padding: 8px;
            background: #1a1a2e;
            margin-bottom: 4px;
            border-radius: 4px;
            cursor: pointer;
            border-left: 3px solid transparent;
        }

        .search-result:hover {
            border-left-color: #e94560;
            background: #0f3460;
        }

        .search-result-name {
            font-weight: 600;
            font-size: 13px;
        }

        .search-result-type {
            font-size: 11px;
            color: #888;
        }

        /* Filters */
        .filter-section {
            margin-bottom: 16px;
        }

        .filter-section h3 {
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 8px;
        }

        .filter-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .filter-chip {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            cursor: pointer;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            transition: all 0.2s;
        }

        .filter-chip:hover {
            border-color: #e94560;
        }

        .filter-chip.active {
            background: #e94560;
            border-color: #e94560;
        }

        /* Stats */
        .stats-section {
            background: #1a1a2e;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 13px;
        }

        .stat-value {
            color: #e94560;
            font-weight: 600;
        }

        /* Node Details Panel */
        .node-details {
            background: #1a1a2e;
            padding: 12px;
            border-radius: 8px;
            margin-top: auto;
            max-height: 300px;
            overflow-y: auto;
        }

        .node-details h3 {
            font-size: 14px;
            margin-bottom: 8px;
            color: #e94560;
        }

        .node-details-content {
            font-size: 12px;
            line-height: 1.5;
        }

        .node-detail-label {
            color: #888;
            margin-top: 8px;
        }

        .node-detail-value {
            margin-top: 2px;
        }

        .edge-list {
            margin-top: 8px;
            font-size: 11px;
        }

        .edge-item {
            padding: 4px 8px;
            background: #16213e;
            margin: 2px 0;
            border-radius: 4px;
            cursor: pointer;
        }

        .edge-item:hover {
            background: #0f3460;
        }

        /* Graph Container */
        .graph-container {
            flex: 1;
            position: relative;
        }

        #graph {
            width: 100%;
            height: 100%;
            background: #1a1a2e;
        }

        /* Controls */
        .controls {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 8px;
            z-index: 100;
        }

        .control-btn {
            padding: 8px 16px;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 6px;
            color: #eee;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .control-btn:hover {
            border-color: #e94560;
            background: #0f3460;
        }

        .control-btn.active {
            background: #e94560;
            border-color: #e94560;
        }

        /* GASL Status Bar */
        .gasl-status {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: #16213e;
            padding: 12px 24px;
            border-radius: 8px;
            border: 1px solid #0f3460;
            display: none;
            z-index: 100;
        }

        .gasl-status.active {
            display: block;
            border-color: #e94560;
        }

        .gasl-status-text {
            font-size: 12px;
            color: #e94560;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 26, 46, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #0f3460;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        /* Importance Slider */
        .slider-container {
            margin-top: 12px;
        }

        .slider-container label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }

        .slider-container input[type="range"] {
            width: 100%;
            accent-color: #e94560;
        }

        /* File Load Section */
        .file-load {
            margin-bottom: 16px;
            padding: 12px;
            background: #1a1a2e;
            border-radius: 8px;
        }

        .file-load input {
            width: 100%;
            padding: 8px;
            border: 1px solid #0f3460;
            border-radius: 4px;
            background: #16213e;
            color: #eee;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .file-load button {
            width: 100%;
            padding: 8px;
            background: #e94560;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }

        .file-load button:hover {
            background: #c73e54;
        }

        /* Legend */
        .legend {
            margin-top: 16px;
            padding: 12px;
            background: #1a1a2e;
            border-radius: 8px;
        }

        .legend h3 {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            padding: 2px 0;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        /* Question Panel */
        .question-panel {
            margin-top: 16px;
            padding: 12px;
            background: #1a1a2e;
            border-radius: 8px;
            border: 1px solid #0f3460;
        }

        .question-panel h3 {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .question-textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #0f3460;
            border-radius: 4px;
            background: #16213e;
            color: #eee;
            font-size: 12px;
            resize: vertical;
            min-height: 64px;
            font-family: inherit;
            box-sizing: border-box;
        }

        .question-textarea:focus {
            outline: none;
            border-color: #e94560;
        }

        .mode-row {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            align-items: center;
        }

        .mode-btn {
            flex: 1;
            padding: 6px 0;
            border-radius: 4px;
            border: 1px solid #0f3460;
            background: #16213e;
            color: #eee;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: #0f3460;
            border-color: #e94560;
            color: #e94560;
        }

        .ask-btn {
            padding: 6px 14px;
            background: #e94560;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }

        .ask-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .ask-btn:hover:not(:disabled) {
            background: #c73e54;
        }

        .query-status {
            margin-top: 8px;
            font-size: 11px;
            color: #ffa726;
            min-height: 16px;
        }

        .gasl-log {
            margin-top: 6px;
            max-height: 80px;
            overflow-y: auto;
            font-size: 10px;
            font-family: monospace;
            color: #888;
            background: #0f1728;
            border-radius: 4px;
            padding: 4px 6px;
            display: none;
        }

        .answer-box {
            margin-top: 8px;
            max-height: 180px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.5;
            color: #eee;
            background: #0f1728;
            border-radius: 4px;
            padding: 8px;
            display: none;
            border-left: 3px solid #e94560;
        }

        .answer-clear {
            margin-top: 6px;
            font-size: 11px;
            color: #888;
            cursor: pointer;
            text-decoration: underline;
            display: none;
        }

        .answer-clear:hover { color: #eee; }

        /* Back-to-full-graph button – shown only while in subgraph mode */
        .back-btn {
            padding: 8px 16px;
            background: #0f3460;
            border: 1px solid #e94560;
            border-radius: 6px;
            color: #e94560;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
            display: none;   /* hidden by default */
        }
        .back-btn:hover {
            background: #e94560;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <h1>Graph Viewer</h1>

            <!-- File Load -->
            <div class="file-load">
                <input type="text" id="graphPath" placeholder="Enter GraphML file path...">
                <button onclick="loadGraph()">Load Graph</button>
            </div>

            <!-- Search -->
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput"
                       placeholder="Search nodes...">
                <div class="search-results" id="searchResults"></div>
            </div>

            <!-- Stats -->
            <div class="stats-section" id="statsSection">
                <div class="stat-row">
                    <span>Nodes</span>
                    <span class="stat-value" id="statNodes">-</span>
                </div>
                <div class="stat-row">
                    <span>Edges</span>
                    <span class="stat-value" id="statEdges">-</span>
                </div>
                <div class="stat-row">
                    <span>Components</span>
                    <span class="stat-value" id="statComponents">-</span>
                </div>
            </div>

            <!-- Filters -->
            <div class="filter-section">
                <h3>Entity Types</h3>
                <div class="filter-chips" id="entityFilters"></div>
            </div>

            <!-- Importance Filter -->
            <div class="slider-container">
                <label>Min Importance: <span id="importanceValue">0.0</span></label>
                <input type="range" id="importanceSlider" min="0" max="1" step="0.05" value="0">
            </div>

            <!-- Legend -->
            <div class="legend" id="legend">
                <h3>Legend</h3>
                <div id="legendItems"></div>
            </div>

            <!-- Question Panel -->
            <div class="question-panel">
                <h3>Ask a Question</h3>
                <!-- BYOK: API key + model picker -->
                <div class="byok-row" style="display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px;">
                    <input type="password" id="apiKeyInput" class="byok-input"
                           placeholder="OpenAI API key (sk-...)"
                           style="flex: 1 1 180px; padding: 6px 8px; background: #2a2a2a; color: #eee; border: 1px solid #444; border-radius: 4px; font-family: inherit; font-size: 12px;">
                    <button class="control-btn" type="button" onclick="toggleShowKey()" id="showKeyBtn" title="Show/hide key">👁</button>
                    <button class="control-btn" type="button" onclick="saveApiKey()">Save</button>
                    <button class="control-btn" type="button" onclick="clearApiKey()">Clear</button>
                </div>
                <div class="byok-row" style="display: flex; gap: 6px; align-items: center; margin-bottom: 6px; font-size: 12px;">
                    <label for="modelSelect" style="color: #aaa;">Model:</label>
                    <select id="modelSelect" onchange="onModelChange()"
                            style="flex: 1; padding: 4px 6px; background: #2a2a2a; color: #eee; border: 1px solid #444; border-radius: 4px;">
                        <optgroup label="GPT-5 (non-reasoning)">
                            <option value="gpt-5.4-mini">gpt-5.4-mini  (default — fastest correct on test graph)</option>
                            <option value="gpt-5.4">gpt-5.4</option>
                            <option value="gpt-5.4-nano">gpt-5.4-nano</option>
                            <option value="gpt-5.2">gpt-5.2</option>
                        </optgroup>
                        <optgroup label="GPT-5 (reasoning)">
                            <option value="gpt-5.5">gpt-5.5  (flagship reasoning)</option>
                            <option value="gpt-5.3-chat-latest">gpt-5.3-chat-latest</option>
                            <option value="gpt-5.1">gpt-5.1</option>
                            <option value="gpt-5-mini">gpt-5-mini</option>
                            <option value="gpt-5-nano">gpt-5-nano</option>
                        </optgroup>
                        <optgroup label="GPT-4.1">
                            <option value="gpt-4.1">gpt-4.1</option>
                            <option value="gpt-4.1-mini">gpt-4.1-mini</option>
                            <option value="gpt-4.1-nano">gpt-4.1-nano  (cheap; sometimes bails early)</option>
                        </optgroup>
                        <optgroup label="o-series reasoning (slower)">
                            <option value="o3-mini">o3-mini</option>
                            <option value="o4-mini">o4-mini</option>
                            <option value="o1">o1</option>
                            <option value="o3">o3</option>
                        </optgroup>
                        <option value="__custom__">Custom…</option>
                    </select>
                    <input type="text" id="customModelInput" placeholder="Custom model id"
                           oninput="saveCustomModel()"
                           style="display: none; flex: 1; padding: 4px 6px; background: #2a2a2a; color: #eee; border: 1px solid #444; border-radius: 4px;">
                </div>
                <div id="apiKeyStatus" style="font-size: 11px; margin-bottom: 8px;">⚠ No API key — queries disabled</div>
                <textarea class="question-textarea" id="questionInput"
                          placeholder="e.g. What cognitive functions are impaired by respiratory disease?"></textarea>
                <div class="mode-row">
                    <button class="mode-btn active" id="modeRag" onclick="setMode('rag')">RAG</button>
                    <button class="mode-btn" id="modeGasl" onclick="setMode('gasl')">GASL</button>
                    <button class="ask-btn" id="askBtn" onclick="askQuestion()">Ask ▶</button>
                </div>
                <div class="query-status" id="queryStatus"></div>
                <div class="gasl-log" id="gaslLog"></div>
                <div class="answer-box" id="answerBox"></div>
                <div id="usageBox" style="display:none; margin-top:6px; font-size:11px; color:#888; padding:4px 6px; background:#1f1f1f; border-radius:4px;"></div>
                <span class="answer-clear" id="answerClear" onclick="clearQueryHighlights()">
                    Clear highlights &amp; answer
                </span>
            </div>

            <!-- Node Details -->
            <div class="node-details" id="nodeDetails">
                <h3>Node Details</h3>
                <div class="node-details-content" id="nodeDetailsContent">
                    <p style="color: #888; font-size: 12px;">Click a node to see details</p>
                </div>
            </div>
        </div>

        <!-- Graph Area -->
        <div class="graph-container">
            <div id="graph"></div>

            <!-- Controls -->
            <div class="controls">
                <button class="back-btn" id="backToFullBtn" onclick="backToFullGraph()">&#8592; Full Graph</button>
                <button class="control-btn" onclick="fitGraph()">Fit View</button>
                <button class="control-btn" onclick="togglePhysics()" id="physicsBtn">Physics: ON</button>
                <button class="control-btn" onclick="resetFilters()">Reset Filters</button>
            </div>

            <!-- GASL Status -->
            <div class="gasl-status" id="gaslStatus">
                <span class="gasl-status-text" id="gaslStatusText">GASL: Idle</span>
            </div>

            <!-- Loading Overlay -->
            <div class="loading-overlay hidden" id="loadingOverlay">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>

    <script>
        // State
        let network = null;
        let nodesDataset = null;
        let edgesDataset = null;
        let physicsEnabled = true;
        let activeFilters = new Set();
        let currentGraphData = null;

        // Entity colors – populated at runtime from /api/colors (auto-assigned on server)
        let ENTITY_COLORS = {};

        async function fetchColors() {
            try {
                const response = await fetch('/api/colors');
                if (response.ok) {
                    ENTITY_COLORS = await response.json();
                }
            } catch (e) {
                console.error('Could not fetch color map:', e);
            }
        }

        // Initialize Socket.IO
        const socket = io();

        socket.on('connect', () => {
            console.log('Connected to server');
        });

        socket.on('graph_loaded', (data) => {
            console.log('Graph loaded:', data);
        });

        socket.on('gasl_update', (state) => {
            updateGaslVisualization(state);
        });

        socket.on('graph_data', (data) => {
            updateGraph(data);
        });

        // Initialize on load
        document.addEventListener('DOMContentLoaded', async () => {
            initializeNetwork();
            await fetchColors();
            fetchGraph();
            setupEventListeners();
        });

        function initializeNetwork() {
            const container = document.getElementById('graph');

            nodesDataset = new vis.DataSet([]);
            edgesDataset = new vis.DataSet([]);

            const data = {
                nodes: nodesDataset,
                edges: edgesDataset
            };

            const options = {
                nodes: {
                    font: {
                        color: '#eee',
                        size: 12
                    }
                },
                edges: {
                    font: {
                        color: '#888',
                        size: 10,
                        strokeWidth: 0
                    }
                },
                physics: {
                    enabled: true,
                    barnesHut: {
                        gravitationalConstant: -2000,
                        centralGravity: 0.1,
                        springLength: 150,
                        springConstant: 0.01,
                        damping: 0.5
                    },
                    stabilization: {
                        iterations: 100
                    }
                },
                interaction: {
                    hover: true,
                    tooltipDelay: 200,
                    hideEdgesOnDrag: true,
                    multiselect: true
                },
                layout: {
                    improvedLayout: true
                }
            };

            network = new vis.Network(container, data, options);

            // Event handlers
            network.on('click', (params) => {
                if (params.nodes.length > 0) {
                    const nodeId = params.nodes[0];
                    showNodeDetails(nodeId);
                }
            });

            network.on('doubleClick', (params) => {
                if (params.nodes.length > 0) {
                    const nodeId = params.nodes[0];
                    focusOnNode(nodeId);
                }
            });

            network.on('stabilizationProgress', (params) => {
                const progress = Math.round(params.iterations / params.total * 100);
                console.log(`Stabilizing: ${progress}%`);
            });

            network.on('stabilizationIterationsDone', () => {
                console.log('Stabilization complete');
            });
        }

        async function fetchGraph() {
            showLoading(true);
            try {
                const minImportance = document.getElementById('importanceSlider').value;
                const entityTypes = Array.from(activeFilters).join(',');

                let url = `/api/graph?min_importance=${minImportance}`;
                if (entityTypes) {
                    url += `&entity_types=${entityTypes}`;
                }

                const response = await fetch(url);
                if (!response.ok) {
                    console.log('No graph loaded yet');
                    showLoading(false);
                    return;
                }

                const data = await response.json();
                updateGraph(data);
                await fetchStats();
            } catch (error) {
                console.error('Error fetching graph:', error);
            }
            showLoading(false);
        }

        function updateGraph(data) {
            currentGraphData = data;

            // Clear existing data
            nodesDataset.clear();
            edgesDataset.clear();

            // Add new data
            nodesDataset.add(data.nodes);
            edgesDataset.add(data.edges);

            // Update entity type filters
            updateEntityFilters(data.stats?.entity_types || {});

            // Update legend
            updateLegend(data.stats?.entity_types || {});

            // Fit view
            setTimeout(() => network.fit(), 500);
        }

        async function fetchStats() {
            try {
                const response = await fetch('/api/stats');
                if (!response.ok) return;

                const stats = await response.json();
                document.getElementById('statNodes').textContent = stats.num_nodes;
                document.getElementById('statEdges').textContent = stats.num_edges;
                document.getElementById('statComponents').textContent = stats.connected_components || '-';
            } catch (error) {
                console.error('Error fetching stats:', error);
            }
        }

        async function loadGraph() {
            const path = document.getElementById('graphPath').value.trim();
            if (!path) return;

            showLoading(true);
            try {
                const response = await fetch('/api/graph/load', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({path})
                });

                const result = await response.json();
                if (result.error) {
                    alert('Error: ' + result.error);
                } else {
                    await fetchColors();
                    await fetchGraph();
                }
            } catch (error) {
                alert('Error loading graph: ' + error.message);
            }
            showLoading(false);
        }

        async function focusOnNode(nodeId) {
            showLoading(true);
            try {
                const response = await fetch(`/api/graph/subgraph/${encodeURIComponent(nodeId)}?depth=2&max_nodes=50`);
                if (!response.ok) {
                    throw new Error('Failed to fetch subgraph');
                }

                const data = await response.json();
                updateGraph(data);
            } catch (error) {
                console.error('Error focusing on node:', error);
            }
            showLoading(false);
        }

        async function showNodeDetails(nodeId) {
            try {
                const response = await fetch(`/api/node/${encodeURIComponent(nodeId)}`);
                if (!response.ok) return;

                const details = await response.json();
                const content = document.getElementById('nodeDetailsContent');

                let html = `
                    <div class="node-detail-label">Name</div>
                    <div class="node-detail-value"><strong>${details.id}</strong></div>

                    <div class="node-detail-label">Type</div>
                    <div class="node-detail-value" style="color: ${ENTITY_COLORS[details.entity_type] || ENTITY_COLORS['DEFAULT'] || '#888'}">
                        ${details.entity_type}
                    </div>

                    <div class="node-detail-label">Importance</div>
                    <div class="node-detail-value">${details.importance_score.toFixed(2)}</div>

                    <div class="node-detail-label">Description</div>
                    <div class="node-detail-value">${details.description || 'No description'}</div>
                `;

                if (details.incoming_edges.length > 0) {
                    html += `<div class="node-detail-label">Incoming (${details.incoming_edges.length})</div>`;
                    html += '<div class="edge-list">';
                    for (const edge of details.incoming_edges.slice(0, 5)) {
                        html += `<div class="edge-item" onclick="focusOnNode('${edge.from}')">${edge.from} --[${edge.relation}]--></div>`;
                    }
                    if (details.incoming_edges.length > 5) {
                        html += `<div class="edge-item" style="color: #888">... and ${details.incoming_edges.length - 5} more</div>`;
                    }
                    html += '</div>';
                }

                if (details.outgoing_edges.length > 0) {
                    html += `<div class="node-detail-label">Outgoing (${details.outgoing_edges.length})</div>`;
                    html += '<div class="edge-list">';
                    for (const edge of details.outgoing_edges.slice(0, 5)) {
                        html += `<div class="edge-item" onclick="focusOnNode('${edge.to}')">--[${edge.relation}]--> ${edge.to}</div>`;
                    }
                    if (details.outgoing_edges.length > 5) {
                        html += `<div class="edge-item" style="color: #888">... and ${details.outgoing_edges.length - 5} more</div>`;
                    }
                    html += '</div>';
                }

                content.innerHTML = html;
            } catch (error) {
                console.error('Error fetching node details:', error);
            }
        }

        function updateEntityFilters(entityTypes) {
            const container = document.getElementById('entityFilters');
            container.innerHTML = '';

            for (const [type, count] of Object.entries(entityTypes).sort((a, b) => b[1] - a[1])) {
                const chip = document.createElement('span');
                chip.className = 'filter-chip' + (activeFilters.has(type) ? ' active' : '');
                chip.style.borderColor = ENTITY_COLORS[type] || ENTITY_COLORS['DEFAULT'];
                chip.textContent = `${type} (${count})`;
                chip.onclick = () => toggleFilter(type, chip);
                container.appendChild(chip);
            }
        }

        function updateLegend(entityTypes) {
            const container = document.getElementById('legendItems');
            container.innerHTML = '';

            for (const type of Object.keys(entityTypes).sort()) {
                const color = ENTITY_COLORS[type] || ENTITY_COLORS['DEFAULT'];
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `
                    <div class="legend-color" style="background: ${color}"></div>
                    <span>${type}</span>
                `;
                container.appendChild(item);
            }
        }

        function toggleFilter(type, chip) {
            if (activeFilters.has(type)) {
                activeFilters.delete(type);
                chip.classList.remove('active');
            } else {
                activeFilters.add(type);
                chip.classList.add('active');
            }
            fetchGraph();
        }

        function resetFilters() {
            activeFilters.clear();
            document.getElementById('importanceSlider').value = 0;
            document.getElementById('importanceValue').textContent = '0.0';
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            fetchGraph();
        }

        function setupEventListeners() {
            // Search input
            const searchInput = document.getElementById('searchInput');
            let searchTimeout;
            searchInput.addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => searchNodes(e.target.value), 300);
            });

            // Importance slider
            const slider = document.getElementById('importanceSlider');
            slider.addEventListener('input', (e) => {
                document.getElementById('importanceValue').textContent = parseFloat(e.target.value).toFixed(2);
            });
            slider.addEventListener('change', () => fetchGraph());
        }

        async function searchNodes(query) {
            const container = document.getElementById('searchResults');

            if (!query || query.length < 2) {
                container.innerHTML = '';
                return;
            }

            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}&limit=10`);
                const data = await response.json();

                container.innerHTML = '';
                for (const result of data.results) {
                    const div = document.createElement('div');
                    div.className = 'search-result';
                    div.innerHTML = `
                        <div class="search-result-name">${result.id}</div>
                        <div class="search-result-type" style="color: ${ENTITY_COLORS[result.entity_type] || ENTITY_COLORS['DEFAULT'] || '#888'}">
                            ${result.entity_type}
                        </div>
                    `;
                    div.onclick = () => {
                        // Focus network on this node
                        network.selectNodes([result.id]);
                        network.focus(result.id, {scale: 1.5, animation: true});
                        showNodeDetails(result.id);
                    };
                    container.appendChild(div);
                }
            } catch (error) {
                console.error('Search error:', error);
            }
        }

        function fitGraph() {
            network.fit({animation: true});
        }

        function togglePhysics() {
            physicsEnabled = !physicsEnabled;
            network.setOptions({physics: {enabled: physicsEnabled}});
            document.getElementById('physicsBtn').textContent = `Physics: ${physicsEnabled ? 'ON' : 'OFF'}`;
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
        }

        // ── Question Panel ─────────────────────────────────────────────────────
        let _queryMode = 'rag';
        let _activeJobId = null;
        let _originalNodeColors = {};   // nodeId → original color object
        let _originalEdgeColors = {};   // edgeId → original color object
        let _subgraphMode = false;      // true while showing query subgraph
        let _lastQueryNodes = [];       // node IDs from last query (for back button)
        let _lastQueryColor = '#f1c40f';
        let _gaslNodeSet = new Set();   // accumulated GASL nodes (for progressive build)

        function setMode(mode) {
            _queryMode = mode;
            document.getElementById('modeRag').classList.toggle('active', mode === 'rag');
            document.getElementById('modeGasl').classList.toggle('active', mode === 'gasl');
            document.getElementById('gaslLog').style.display = 'none';
        }

        // ── BYOK (Bring Your Own API Key) ──────────────────────────────────────
        const _LS_KEY_API = 'nano_graphrag_api_key';
        const _LS_KEY_MODEL = 'nano_graphrag_model';
        const _LS_KEY_CUSTOM_MODEL = 'nano_graphrag_custom_model';

        function getApiKey() {
            return (localStorage.getItem(_LS_KEY_API) || '').trim();
        }
        function getModel() {
            const sel = document.getElementById('modelSelect').value;
            if (sel === '__custom__') {
                return (document.getElementById('customModelInput').value || '').trim();
            }
            return sel;
        }
        function saveApiKey() {
            const v = document.getElementById('apiKeyInput').value.trim();
            if (!v) { return clearApiKey(); }
            localStorage.setItem(_LS_KEY_API, v);
            updateApiKeyUI();
        }
        function clearApiKey() {
            localStorage.removeItem(_LS_KEY_API);
            document.getElementById('apiKeyInput').value = '';
            updateApiKeyUI();
        }
        function toggleShowKey() {
            const i = document.getElementById('apiKeyInput');
            i.type = (i.type === 'password') ? 'text' : 'password';
        }
        function onModelChange() {
            const sel = document.getElementById('modelSelect').value;
            document.getElementById('customModelInput').style.display =
                (sel === '__custom__') ? 'block' : 'none';
            localStorage.setItem(_LS_KEY_MODEL, sel);
            updateApiKeyUI();
        }
        function saveCustomModel() {
            localStorage.setItem(_LS_KEY_CUSTOM_MODEL,
                document.getElementById('customModelInput').value.trim());
            updateApiKeyUI();
        }
        function updateApiKeyUI() {
            const key = getApiKey();
            const model = getModel();
            const status = document.getElementById('apiKeyStatus');
            const askBtn = document.getElementById('askBtn');
            if (key && model) {
                status.textContent = '✅ Key saved · model: ' + model;
                status.style.color = '#27ae60';
                askBtn.disabled = false;
            } else if (!key) {
                status.textContent = '⚠ No API key — queries disabled';
                status.style.color = '#e67e22';
                askBtn.disabled = true;
            } else {
                status.textContent = '⚠ Pick a model';
                status.style.color = '#e67e22';
                askBtn.disabled = true;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem(_LS_KEY_API) || '';
            if (savedKey) document.getElementById('apiKeyInput').value = savedKey;
            const savedModel = localStorage.getItem(_LS_KEY_MODEL) || 'gpt-5.4-mini';
            const sel = document.getElementById('modelSelect');
            const known = Array.from(sel.options).map(o => o.value);
            sel.value = known.includes(savedModel) ? savedModel : 'gpt-5.4-mini';
            if (sel.value === '__custom__') {
                document.getElementById('customModelInput').style.display = 'block';
                document.getElementById('customModelInput').value =
                    localStorage.getItem(_LS_KEY_CUSTOM_MODEL) || '';
            }
            updateApiKeyUI();
        });

        async function askQuestion() {
            const question = document.getElementById('questionInput').value.trim();
            if (!question) return;

            // Reset UI
            clearQueryHighlights();
            document.getElementById('queryStatus').textContent =
                _queryMode === 'rag' ? 'Searching…' : 'Starting GASL traversal…';
            document.getElementById('answerBox').style.display = 'none';
            document.getElementById('answerClear').style.display = 'none';
            document.getElementById('askBtn').disabled = true;

            if (_queryMode === 'gasl') {
                document.getElementById('gaslLog').style.display = 'block';
                document.getElementById('gaslLog').innerHTML = '';
            }

            try {
                const resp = await fetch('/api/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + getApiKey(),
                    },
                    body: JSON.stringify({question, mode: _queryMode, model: getModel()}),
                });

                if (resp.status === 401) {
                    document.getElementById('queryStatus').textContent =
                        'API key missing or rejected — set it above and try again.';
                    document.getElementById('askBtn').disabled = false;
                    updateApiKeyUI();
                    return;
                }
                const data = await resp.json();

                if (data.error) {
                    document.getElementById('queryStatus').textContent = 'Error: ' + data.error;
                    document.getElementById('askBtn').disabled = false;
                    return;
                }

                if (data.mode === 'rag') {
                    // Show only the relevant subgraph, highlighted in gold
                    showSubgraph(data.nodes, data.edges, '#f1c40f');
                    showAnswer(data.answer);
                    showUsage(data.usage, data.model);
                    document.getElementById('queryStatus').textContent =
                        `Found ${data.nodes.length} relevant nodes`;
                    document.getElementById('askBtn').disabled = false;
                } else {
                    // GASL: wait for SocketIO events
                    _activeJobId = data.job_id;
                    document.getElementById('queryStatus').textContent =
                        'GASL running… (this may take a minute)';
                    // askBtn re-enabled in query_complete handler
                }
            } catch (e) {
                document.getElementById('queryStatus').textContent = 'Request failed: ' + e.message;
                document.getElementById('askBtn').disabled = false;
            }
        }

        function highlightQueryNodes(nodeIds, color, opacity) {
            if (!nodeIds || nodeIds.length === 0) return;
            const updates = nodeIds.map(id => {
                const existing = nodesDataset.get(id);
                if (!existing) return null;
                // Save original colors (only once)
                if (!_originalNodeColors[id]) {
                    _originalNodeColors[id] = existing.color || {};
                }
                return {
                    id,
                    color: {
                        background: color,
                        border: '#ffffff',
                        highlight: {background: color, border: '#ffffff'},
                    },
                    opacity: opacity !== undefined ? opacity : 1.0,
                    borderWidth: 3,
                };
            }).filter(Boolean);
            if (updates.length) nodesDataset.update(updates);
        }

        function highlightQueryEdges(edges, color) {
            if (!edges || edges.length === 0) return;
            const updates = [];
            edges.forEach(([src, tgt]) => {
                const matches = edgesDataset.get({
                    filter: e => e.from === src && e.to === tgt
                });
                matches.forEach(edge => {
                    if (!_originalEdgeColors[edge.id]) {
                        _originalEdgeColors[edge.id] = edge.color || {};
                    }
                    updates.push({
                        id: edge.id,
                        color: {color, highlight: color, opacity: 1.0},
                        width: 3,
                    });
                });
            });
            if (updates.length) edgesDataset.update(updates);
        }

        function clearQueryHighlights() {
            // If in subgraph mode, restore full graph first
            if (_subgraphMode) {
                _subgraphMode = false;
                document.getElementById('backToFullBtn').style.display = 'none';
                // Reload full graph from cached data (no server round-trip)
                if (currentGraphData) updateGraph(currentGraphData);
                _originalNodeColors = {};
                _originalEdgeColors = {};
            } else {
                // Just restore colors in place
                const nodeUpdates = Object.entries(_originalNodeColors).map(([id, color]) => ({
                    id, color, opacity: 1.0, borderWidth: 2,
                }));
                if (nodeUpdates.length) nodesDataset.update(nodeUpdates);

                const edgeUpdates = Object.entries(_originalEdgeColors).map(([id, color]) => ({
                    id, color,
                }));
                if (edgeUpdates.length) edgesDataset.update(edgeUpdates);

                _originalNodeColors = {};
                _originalEdgeColors = {};
            }

            _activeJobId = null;
            _lastQueryNodes = [];
            _gaslNodeSet.clear();

            document.getElementById('answerBox').style.display = 'none';
            document.getElementById('answerClear').style.display = 'none';
            document.getElementById('usageBox').style.display = 'none';
            document.getElementById('queryStatus').textContent = '';
            document.getElementById('gaslLog').style.display = 'none';
            document.getElementById('gaslLog').innerHTML = '';
        }

        /**
         * Filter the vis.js display to only the queried nodes and their
         * interconnecting edges, then highlight them.  The full graph data
         * stays in currentGraphData so backToFullGraph() can restore it.
         */
        function showSubgraph(nodeIds, queryEdges, color) {
            if (!currentGraphData || nodeIds.length === 0) {
                // Fallback: just highlight in place
                highlightQueryNodes(nodeIds, color);
                highlightQueryEdges(queryEdges, color);
                return;
            }

            _lastQueryNodes = nodeIds;
            _lastQueryColor = color;

            const nodeIdSet = new Set(nodeIds);

            // Pull matching node objects from the full cached graph
            const subNodes = currentGraphData.nodes
                .filter(n => nodeIdSet.has(n.id))
                .map(n => ({
                    ...n,
                    color: {
                        background: color,
                        border: '#ffffff',
                        highlight: {background: color, border: '#ffffff'},
                    },
                    borderWidth: 3,
                    opacity: 1.0,
                }));

            // Include edges where both endpoints are in the result set
            const subEdges = currentGraphData.edges.filter(
                e => nodeIdSet.has(e.from) && nodeIdSet.has(e.to)
            );

            // Swap dataset contents to the filtered view
            nodesDataset.clear();
            edgesDataset.clear();
            nodesDataset.add(subNodes);
            edgesDataset.add(subEdges);

            _subgraphMode = true;
            document.getElementById('backToFullBtn').style.display = 'inline-block';

            // Reset colour maps – nothing to restore inside subgraph
            _originalNodeColors = {};
            _originalEdgeColors = {};

            setTimeout(() => network.fit({animation: true}), 300);
        }

        /**
         * Restore the full graph display (with the last query highlights
         * still applied so the user can see which nodes were relevant).
         */
        function backToFullGraph() {
            if (!currentGraphData) return;

            // Rebuild datasets from the full cached graph
            updateGraph(currentGraphData);

            // Re-apply the last query highlights on top of the full graph
            if (_lastQueryNodes.length) {
                // Give updateGraph a tick to finish, then highlight
                setTimeout(() => highlightQueryNodes(_lastQueryNodes, _lastQueryColor), 100);
            }

            _subgraphMode = false;
            document.getElementById('backToFullBtn').style.display = 'none';
        }

        function showAnswer(text) {
            const box = document.getElementById('answerBox');
            box.textContent = text;
            box.style.display = 'block';
            document.getElementById('answerClear').style.display = 'block';
        }

        function showUsage(usage, model) {
            const box = document.getElementById('usageBox');
            if (!usage || !usage.calls) {
                box.style.display = 'none';
                return;
            }
            const fmt = n => (n || 0).toLocaleString();
            const m = model || getModel();
            box.innerHTML =
                '<strong>tokens:</strong> ' +
                fmt(usage.prompt_tokens) + ' prompt + ' +
                fmt(usage.completion_tokens) + ' completion = ' +
                fmt(usage.total_tokens) + ' total ' +
                '<span style="color:#666;">(' + usage.calls +
                ' LLM call' + (usage.calls !== 1 ? 's' : '') +
                (m ? ' · ' + m : '') + ')</span>';
            box.style.display = 'block';
        }

        /**
         * Incrementally add newly-discovered GASL nodes to the live subgraph view.
         * Called on each gasl_highlight event so the graph builds up in real time.
         */
        function addNodesToLiveSubgraph(newNodeIds, color) {
            if (!currentGraphData || !newNodeIds.length) return;

            // Filter to nodes not already displayed
            const truly_new = newNodeIds.filter(id => !_gaslNodeSet.has(id));
            if (!truly_new.length) return;

            truly_new.forEach(id => _gaslNodeSet.add(id));
            _lastQueryNodes = [..._gaslNodeSet];

            // Fetch node objects from cached full graph
            const nodeMap = new Map(currentGraphData.nodes.map(n => [n.id, n]));
            const nodesToAdd = truly_new
                .filter(id => nodeMap.has(id) && !nodesDataset.get(id))
                .map(id => ({
                    ...nodeMap.get(id),
                    color: {background: color, border: '#ffffff',
                            highlight: {background: color, border: '#ffffff'}},
                    borderWidth: 3,
                    opacity: 1.0,
                }));

            if (nodesToAdd.length) nodesDataset.add(nodesToAdd);

            // Add any edges that now have both endpoints in the view
            const edgesToAdd = currentGraphData.edges.filter(
                e => _gaslNodeSet.has(e.from) && _gaslNodeSet.has(e.to)
                     && !edgesDataset.get(e.id)
            );
            if (edgesToAdd.length) edgesDataset.add(edgesToAdd);

            // Enter subgraph mode on first hit
            if (!_subgraphMode) {
                nodesDataset.clear();
                edgesDataset.clear();
                nodesDataset.add(nodesToAdd);
                _subgraphMode = true;
                _lastQueryColor = color;
                document.getElementById('backToFullBtn').style.display = 'inline-block';
            }
        }

        // SocketIO handlers for GASL streaming
        socket.on('gasl_step', (data) => {
            if (data.job_id !== _activeJobId) return;
            document.getElementById('queryStatus').textContent =
                `GASL: ${data.command_type} – ${data.status}`;
            const log = document.getElementById('gaslLog');
            log.innerHTML += `<div>${data.command}</div>`;
            log.scrollTop = log.scrollHeight;
        });

        socket.on('gasl_highlight', (data) => {
            if (data.job_id !== _activeJobId) return;
            if (data.nodes && data.nodes.length) {
                // Build subgraph incrementally – orange while GASL is walking
                addNodesToLiveSubgraph(data.nodes, '#ff9800');
            }
        });

        socket.on('query_complete', (data) => {
            if (data.job_id !== _activeJobId) return;
            // Re-colour all touched nodes green (final answer)
            if (data.nodes && data.nodes.length) {
                // If subgraph is already visible, just recolour in place
                if (_subgraphMode) {
                    const updates = data.nodes.map(id => {
                        if (!nodesDataset.get(id)) return null;
                        return {
                            id,
                            color: {background: '#4caf50', border: '#ffffff',
                                    highlight: {background: '#66bb6a', border: '#ffffff'}},
                            borderWidth: 3,
                        };
                    }).filter(Boolean);
                    if (updates.length) nodesDataset.update(updates);
                    _lastQueryColor = '#4caf50';
                } else {
                    showSubgraph(data.nodes, [], '#4caf50');
                }
            }
            const iters = data.iterations || 0;
            document.getElementById('queryStatus').textContent =
                `Done in ${iters} iteration${iters !== 1 ? 's' : ''} · ${data.nodes ? data.nodes.length : 0} nodes touched`;
            // Show final answer (replaces any streamed partial)
            showAnswer(data.answer);
            showUsage(data.usage);
            document.getElementById('askBtn').disabled = false;
            _activeJobId = null;
            _gaslNodeSet.clear();
        });

        // ── GASL Visualization (existing system highlight) ─────────────────────
        function updateGaslVisualization(state) {
            const statusEl = document.getElementById('gaslStatus');
            const textEl = document.getElementById('gaslStatusText');

            if (state.active) {
                statusEl.classList.add('active');
                textEl.textContent = `GASL: ${state.current_command || 'Running...'}`;

                // Highlight nodes
                if (state.highlighted_nodes && state.highlighted_nodes.length > 0) {
                    const updates = state.highlighted_nodes.map(id => ({
                        id,
                        borderWidth: 4,
                        color: {border: '#ff0000'}
                    }));
                    nodesDataset.update(updates);
                }

                // Highlight edges
                if (state.highlighted_edges && state.highlighted_edges.length > 0) {
                    const updates = state.highlighted_edges.map(([from, to]) => {
                        const edgeId = edgesDataset.get({
                            filter: e => e.from === from && e.to === to
                        })[0]?.id;
                        if (edgeId) {
                            return {id: edgeId, color: {color: '#ff0000'}, width: 4};
                        }
                        return null;
                    }).filter(Boolean);
                    edgesDataset.update(updates);
                }
            } else {
                statusEl.classList.remove('active');
                // Reset highlights
                fetchGraph();
            }
        }
    </script>
</body>
</html>
